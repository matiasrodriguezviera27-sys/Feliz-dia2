<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feliz día, mi amor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --pink:#f9d5d5;
      --peach:#fbd5cc;
      --text:#333;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family: Montserrat, Arial, sans-serif;
      color:var(--text);
      background:#fff;
    }

    .hero{
      text-align:center;
      padding:28px 16px;
      background:linear-gradient(#fff 0%, #fbe8ee 100%);
    }

    .hero .title{
      font-family:'Great Vibes', cursive;
      font-size:44px;
      color:#e26a88;
      margin:8px 0 6px;
    }

    .section{
      padding:18px 20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .card{
      width:100%;
      max-width:1000px;
      text-align:left;
      background:#fff;
      border-radius:14px;
      padding:16px;
      box-shadow:0 4px 12px rgba(0,0,0,.05);
      border:1px solid #f3e6e6;
    }

    .profile-row{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:20px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .profile-row img{
      width:100%;
      max-width:420px;
      height:auto;
      border-radius:16px;
      border:4px solid #fff;
      box-shadow:0 6px 14px rgba(0,0,0,.15);
      display:block;
    }

    .qr-block{
      text-align:center;
      padding:12px 0;
    }

    .btn{
      display:inline-block;
      padding:10px 14px;
      background:#e76a8a;
      color:#fff;
      border-radius:999px;
      text-decoration:none;
      font-weight:600;
    }

    @media (max-width:768px){

      .profile-row{
        gap:12px;
      }

      .profile-row img{
        max-width:45%;
      }

      .hero .title{
        font-size:36px;
      }

    }

    @media (max-width:500px){

      .profile-row img{
        max-width:100%;
      }

    }

  </style>
</head>

<body>

<header class="hero">
  <div class="title">Feliz día, BeBe</div>
  <p style="color:#666;margin:6px 0 0;">Una pequeña sorpresa para ti</p>
</header>

<main>

<section class="section">

<div class="card">

<p style="text-align:center;">
Contenido personalizado con tus frases o mensajes.
</p>

<div class="profile-row">
<img src="Verónica/vero01.jpeg" alt="Foto 1">
<img src="Verónica/vero02.jpeg" alt="Foto 2">
</div>

</div>

</section>

<section class="section">

<div class="card" style="text-align:center;">

<h3>Escanea para abrir la página</h3>

<div class="qr-block" id="qrcode"></div>

<p style="font-size:.9em;color:#666;">
O abre la URL en tu móvil:
<a href="https://feliz-dia2.vercel.app/" target="_blank">
https://feliz-dia2.vercel.app/
</a>
</p>

<a class="btn"
href="https://feliz-dia2.vercel.app/"
target="_blank">
Abrir página
</a>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"),{
text:"https://feliz-dia2.vercel.app/",
width:180,
height:180
});
</script>

</body>
</html>
